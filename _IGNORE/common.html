<!-- Common markup for app bar & sidebar, as well as material button template code. -->
<!-- Full HTML sheet -->
<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <!-- material.io -->
    <!-- For material.io, please do not alter -->
    <link href="https://unpkg.com/material-components-web@11.0.0/dist/material-components-web.min.css" rel="stylesheet">
    <script src="https://unpkg.com/material-components-web@11.0.0/dist/material-components-web.min.js"></script>
    <!-- Icon pack -->
    <link href="https://fonts.googleapis.com/css?family=Material+Icons|Material+Icons+Outlined|Material+Icons+Two+Tone|Material+Icons+Round|Material+Icons+Sharp" rel="stylesheet">
    <!-- styling (for icons and such) -->
    <link rel='stylesheet' href='/common.css'>
    <!-- end material.io -->
    <!-- additional UI styling -->
    <style>
      #main-content {
        position: absolute;
        top: 65px;
      }
    </style>
  </head>
  <body>
    <!-- App bar and nav drawer (sidebar). DO NOT EDIT, unless you wish to make changes. Then please copy the changes into common.html and edit **ALL** pages for consistency. -->
    <header class="mdc-top-app-bar">
      <div class="mdc-top-app-bar__row">
        <section class="mdc-top-app-bar__section mdc-top-app-bar__section--align-start">
          <button class="material-icons mdc-top-app-bar__navigation-icon mdc-icon-button" aria-label="Home" id="navbarbtn" onclick="location.href='/'">home</button>
        </section>
        <section class="mdc-top-app-bar__section mdc-top-app-bar__section--align-end" role="toolbar">
          <button class='mdc-top-app-bar__action-item mdc-button' style='height: 64px' onclick="location.href='/MCPPPP/'">
            <div class='mdc-button__ripple'></div>
            <span class='mdc-button__label'>MCPPPP</span>
          </button>
          <button class='mdc-top-app-bar__action-item mdc-button' style='height: 64px' onclick="location.href='/donate.html'">
            <div class='mdc-button__ripple'></div>
            <span class='mdc-button__label'>Donate</span>
          </button>
          <button class="mdc-top-app-bar__action-item mdc-icon-button" onclick="window.open('https://github.com/supsm')">
            <img src="res/img/gh.png" aria-label="GitHub" />
            <div class='mdc-tooltip' role='tooltip' style=''>
              <div class='mdc-tooltip__surface'>
                GitHub
              </div>
            </div>
          </button>
          <button class='mdc-top-app-bar__action-item mdc-icon-button' onclick="window.open('https://discord.gg/waXJDswsaR')">
            <img src='res/img/discrd.png' aria-label="Discord" style='width: 22px' />
            <div class='mdc-tooltip' role='tooltip'>
              <div class='mdc-tooltip__surface'>
                Discord
              </div>
            </div>
          </button>
        </section>
      </div>
    </header>
    <!-- end appbar -->

    <!-- @supsm for future reference, do this to add a button: (you may copy template) [Remove all backslashes in comment tags]
      <button class="[additional classes] mdc-button">
        <div class='mdc-button__ripple'></div> <!-- allows for a ripple effect when clicking the button, aesthetics and optional. Use this on **main navbar** buttons for consistency. -\->
        <span class='mdc-button__label'>Button Text</span>
      </button>
    -->
    <br />
    <!-- Place all text content inside div tags below. -->
    <div class='mdc-typography' id='main-content'>

    </div>

    <!-- Scripts for UI functionality. Please don't touch. -->
    <script>
      // Tooltip functionality
      document.querySelectorAll('.mdc-tooltip').forEach(e => {
        e.addEventListener('mouseenter', () => {
          e.style.display = 'block !important';
        });
        e.addEventListener('mouseleave', () => {
          e.style.display = 'none !important';
        })
      });
    </script>
  </body>
</html>
